name: MedVision AI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install httpx2
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install fastapi uvicorn python-multipart pillow numpy scikit-learn pytest
    
    - name: Run tests
      run: pytest tests/test_model.py -v
    
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t medvision-ai .
